name: KnightMarketplace CI

on:
  push:
    branches:
      - main-server-sync
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  server-ci:
    name: Server Install and Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Verify backend entry point
        run: test -f ./bin/www

  client-ci:
    name: Client Tests and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Run client tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build client
        run: npm run build
        env:
          CI: true
